services:
  funding-ops-ingest:
    build:
      context: .
      dockerfile: docker/ingest/Dockerfile
    container_name: funding-ops-ingest
    env_file:
      - .env.local
    environment:
      INGEST_SERVICE_PORT: ${INGEST_SERVICE_PORT:-8787}
      INGEST_SHARED_SECRET: ${INGEST_SHARED_SECRET}
      INGEST_SOURCE_TIMEOUT_MS: ${INGEST_SOURCE_TIMEOUT_MS:-20000}
      INGEST_USER_AGENT: ${INGEST_USER_AGENT:-FundingOpsIngest/0.1}
      SIMPLER_GRANTS_API_KEY: ${SIMPLER_GRANTS_API_KEY}
      SAM_API_KEY: ${SAM_API_KEY}
      USAJOBS_API_KEY: ${USAJOBS_API_KEY}
      USAJOBS_API_EMAIL: ${USAJOBS_API_EMAIL}
    ports:
      - "${INGEST_SERVICE_PORT:-8787}:8787"
    volumes:
      - ${FUNDING_OPS_STORAGE_ROOT:-./runtime/data}:/app/runtime/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health',{headers:{'x-ingest-secret':process.env.INGEST_SHARED_SECRET||''}}).then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped
